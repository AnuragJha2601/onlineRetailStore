<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhanak Trinket - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-purple-800">🔧 Admin Panel - Dhanak Trinket</h1>
                <a href="index.html"
                    class="bg-purple-100 text-purple-800 px-4 py-2 rounded-md hover:bg-purple-200 transition-colors">
                    ← Back to Store
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Success/Error Messages -->
        <div id="messageContainer" class="mb-6"></div>

        <!-- Upload Form -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold text-gray-800 mb-6">📦 Add New Product</h2>

            <form id="productForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
                        <input type="text" id="name" name="name" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>

                    <div>
                        <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                        <select id="category" name="category" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500">
                            <option value="">Select Category</option>
                            <option value="Bangles">Bangles</option>
                            <option value="Necklaces">Necklaces</option>
                            <option value="Earrings">Earrings</option>
                            <option value="Rings">Rings</option>
                            <option value="Bracelets">Bracelets</option>
                            <option value="Anklets">Anklets</option>
                            <option value="MangalSutra">Mangal Sutra</option>
                            <option value="NoseRings">Nose Rings</option>
                            <option value="Pendants">Pendants</option>
                            <option value="BroochesAndPins">Brooches & Pins</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="description" name="description" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="Describe this beautiful jewelry piece..."></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="price" class="block text-sm font-medium text-gray-700 mb-1">Price (₹) *</label>
                        <input type="number" id="price" name="price" required min="0" step="0.01"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>

                    <div class="flex items-center">
                        <label class="flex items-center">
                            <input type="checkbox" id="isInStock" name="isInStock" checked
                                class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                            <span class="ml-2 text-sm text-gray-700">In Stock</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label for="images" class="block text-sm font-medium text-gray-700 mb-1">Product Images</label>
                    <div
                        class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md hover:border-purple-400 transition-colors">
                        <div class="space-y-1 text-center">
                            <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none"
                                viewBox="0 0 48 48">
                                <path
                                    d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <div class="flex text-sm text-gray-600">
                                <label for="images"
                                    class="relative cursor-pointer bg-white rounded-md font-medium text-purple-600 hover:text-purple-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-purple-500">
                                    <span>Upload photos</span>
                                    <input id="images" name="images" type="file" accept="image/*" multiple
                                        class="sr-only">
                                </label>
                                <p class="pl-1">or drag and drop</p>
                            </div>
                            <p class="text-xs text-gray-500">PNG, JPG, GIF up to 10MB each</p>
                        </div>
                    </div>
                    <div id="imagePreview" class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn"
                        class="w-full bg-purple-600 text-white py-2 px-4 rounded-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 transition-colors">
                        💎 Add Product to Store
                    </button>
                </div>
            </form>
        </div>

        <!-- Recent Products -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-6">📋 Recent Products</h2>
            <div id="recentProducts" class="space-y-4">
                <div class="text-center py-4 text-gray-500">
                    <div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-purple-600"></div>
                    <p class="mt-2">Loading recent products...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Force production API - cache busting version 2.0
        const API_BASE_URL = 'https://api-dhanak-trinket-2026.azurewebsites.net';
        console.log('🚀 Dhanak Trinket Admin - Using Production API:', API_BASE_URL);

        document.addEventListener('DOMContentLoaded', function () {
            loadRecentProducts();
            setupImagePreview();
            setupFormSubmission();
        });

        function showMessage(message, isSuccess = true) {
            const container = document.getElementById('messageContainer');
            const bgColor = isSuccess ? 'bg-green-100 border-green-400 text-green-700' : 'bg-red-100 border-red-400 text-red-700';

            container.innerHTML = `
                <div class="${bgColor} px-4 py-3 rounded border" role="alert">
                    <span class="block sm:inline">${message}</span>
                </div>
            `;

            // Auto-hide after 5 seconds
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function setupImagePreview() {
            const imageInput = document.getElementById('images');
            const previewContainer = document.getElementById('imagePreview');

            imageInput.addEventListener('change', function (e) {
                previewContainer.innerHTML = '';

                Array.from(e.target.files).forEach((file, index) => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            const preview = document.createElement('div');
                            preview.className = 'relative';
                            preview.innerHTML = `
                                <img src="${e.target.result}" alt="Preview ${index + 1}" class="w-full h-24 object-cover rounded-md">
                                <div class="absolute top-1 right-1 bg-black bg-opacity-50 text-white text-xs px-2 py-1 rounded">
                                    ${(file.size / 1024 / 1024).toFixed(1)}MB
                                </div>
                            `;
                            previewContainer.appendChild(preview);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            });
        }

        function setupFormSubmission() {
            const form = document.getElementById('productForm');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                submitBtn.disabled = true;
                submitBtn.innerHTML = '⏳ Adding Product...';

                try {
                    const formData = new FormData();
                    formData.append('name', document.getElementById('name').value);
                    formData.append('description', document.getElementById('description').value);
                    formData.append('price', document.getElementById('price').value);
                    formData.append('category', document.getElementById('category').value);
                    formData.append('isInStock', document.getElementById('isInStock').checked);

                    const response = await fetch(`${API_BASE_URL}/api/Products`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Failed to create product: ${errorText}`);
                    }

                    const result = await response.json();

                    // Upload images if any
                    const imageFiles = document.getElementById('images').files;
                    if (imageFiles.length > 0 && result.data) {
                        await uploadImages(result.data.id, imageFiles);
                    }

                    showMessage(`✅ Product "${document.getElementById('name').value}" added successfully!`);
                    form.reset();
                    document.getElementById('imagePreview').innerHTML = '';
                    loadRecentProducts();

                } catch (error) {
                    console.error('Error:', error);
                    showMessage(`❌ Error: ${error.message}`, false);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '💎 Add Product to Store';
                }
            });
        }

        async function uploadImages(productId, files) {
            for (const file of files) {
                try {
                    const formData = new FormData();
                    formData.append('image', file);

                    const response = await fetch(`${API_BASE_URL}/api/Products/${productId}/images`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        console.error('Failed to upload image:', file.name);
                    }
                } catch (error) {
                    console.error('Error uploading image:', error);
                }
            }
        }

        async function loadRecentProducts() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/Products`);

                if (!response.ok) {
                    throw new Error('Failed to load products');
                }

                const result = await response.json();
                const products = result.data || [];

                const container = document.getElementById('recentProducts');

                if (products.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8">
                            <div class="text-4xl mb-2">📦</div>
                            <p class="text-gray-500">No products yet. Add your first product above!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = products.slice(0, 5).map(product => `
                    <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h3 class="font-semibold text-lg text-gray-800">${product.name}</h3>
                                <p class="text-gray-600 text-sm mt-1">${product.description || 'No description'}</p>
                                <div class="flex items-center gap-4 mt-2">
                                    <span class="font-bold text-purple-600">₹${product.price.toLocaleString()}</span>
                                    <span class="px-2 py-1 bg-purple-100 text-purple-800 rounded-full text-xs">${getCategoryDisplayName(product.category)}</span>
                                    <span class="text-sm ${product.isInStock ? 'text-green-600' : 'text-red-600'}">
                                        ${product.isInStock ? '✅ In Stock' : '❌ Out of Stock'}
                                    </span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-gray-500">
                                    ${new Date(product.createdAt).toLocaleDateString()}
                                </div>
                                <div class="text-sm text-gray-500 mt-1">
                                    ❤️ ${product.likesCount || 0} likes
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading recent products:', error);
                document.getElementById('recentProducts').innerHTML = `
                    <div class="text-center py-4 text-red-600">
                        ❌ Failed to load recent products
                    </div>
                `;
            }
        }

        function getCategoryDisplayName(category) {
            const names = {
                'Bangles': 'Bangles',
                'Necklaces': 'Necklaces',
                'Earrings': 'Earrings',
                'Rings': 'Rings',
                'Bracelets': 'Bracelets',
                'Anklets': 'Anklets',
                'MangalSutra': 'Mangal Sutra',
                'NoseRings': 'Nose Rings',
                'Pendants': 'Pendants',
                'BroochesAndPins': 'Brooches & Pins'
            };
            return names[category] || category;
        }
    </script>
</body>

</html>
