<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhanak Trinket - Elegant Jewelry Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card:hover {
            transform: translateY(-5px);
            transition: transform 0.3s ease;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-pink-50 to-purple-50">
    <header class="bg-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <h1 class="text-4xl font-bold text-center text-purple-800">✨ Dhanak Trinket ✨</h1>
            <p class="text-center text-gray-600 mt-2">Discover Elegant Jewelry Collection</p>
            <div class="flex justify-center mt-4">
                <a href="admin.html"
                    class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700 transition-colors">Admin
                    Panel</a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Search and Filter -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="searchInput" placeholder="Search jewelry..."
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <select id="categoryFilter"
                    class="px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500">
                    <option value="">All Categories</option>
                    <option value="Bangles">Bangles</option>
                    <option value="Necklaces">Necklaces</option>
                    <option value="Earrings">Earrings</option>
                    <option value="Rings">Rings</option>
                    <option value="Bracelets">Bracelets</option>
                    <option value="Anklets">Anklets</option>
                    <option value="MangalSutra">Mangal Sutra</option>
                    <option value="NoseRings">Nose Rings</option>
                    <option value="Pendants">Pendants</option>
                    <option value="BroochesAndPins">Brooches & Pins</option>
                </select>
                <button onclick="searchProducts()"
                    class="bg-purple-600 text-white px-6 py-2 rounded-md hover:bg-purple-700 transition-colors">
                    Search
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600"></div>
            <p class="mt-2 text-gray-600">Loading beautiful jewelry...</p>
        </div>

        <!-- Products Grid -->
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        </div>

        <!-- No Products -->
        <div id="noProducts" class="text-center py-12 hidden">
            <div class="text-6xl mb-4">💎</div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">No jewelry found</h3>
            <p class="text-gray-500">Try adjusting your search or category filter</p>
        </div>
    </main>

    <script>
        // Force production API - cache busting version 2.0
        const API_BASE_URL = 'https://api-dhanak-trinket-2026.azurewebsites.net';
        let allProducts = [];
        console.log('🚀 Dhanak Trinket - Using Production API:', API_BASE_URL);

        // Load products when page loads
        document.addEventListener('DOMContentLoaded', loadProducts);

        async function loadProducts() {
            try {
                document.getElementById('loading').classList.remove('hidden');
                console.log('📡 Fetching from:', `${API_BASE_URL}/api/Products`);
                const response = await fetch(`${API_BASE_URL}/api/Products?v=2.0`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                allProducts = result.data || [];

                document.getElementById('loading').classList.add('hidden');
                displayProducts(allProducts);

            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('noProducts').classList.remove('hidden');
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            const noProducts = document.getElementById('noProducts');

            if (!products.length) {
                grid.classList.add('hidden');
                noProducts.classList.remove('hidden');
                return;
            }

            noProducts.classList.add('hidden');
            grid.classList.remove('hidden');

            grid.innerHTML = products.map(product => `
                <div class="bg-white rounded-lg shadow-md product-card overflow-hidden">
                    <div class="h-48 bg-gradient-to-br from-purple-100 to-pink-100 flex items-center justify-center">
                        ${product.images && product.images.length > 0
                    ? `<img src="${product.images[0].imageUrl}" alt="${product.name}" class="w-full h-full object-cover">`
                    : `<div class="text-4xl">${getCategoryIcon(product.category)}</div>`
                }
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold text-lg text-gray-800 mb-2">${product.name}</h3>
                        <p class="text-sm text-gray-600 mb-2">${product.description || 'Beautiful jewelry piece'}</p>
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-2xl font-bold text-purple-600">₹${product.price.toLocaleString()}</span>
                            <span class="px-2 py-1 bg-purple-100 text-purple-800 rounded-full text-xs">${getCategoryDisplayName(product.category)}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm ${product.isInStock ? 'text-green-600' : 'text-red-600'}">
                                ${product.isInStock ? '✅ In Stock' : '❌ Out of Stock'}
                            </span>
                            <button onclick="likeProduct(${product.id})" class="flex items-center space-x-1 text-gray-500 hover:text-red-500 transition-colors">
                                <span>❤️</span>
                                <span>${product.likesCount || 0}</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getCategoryIcon(category) {
            const icons = {
                'Bangles': '📿',
                'Necklaces': '📿',
                'Earrings': '👂',
                'Rings': '💍',
                'Bracelets': '📿',
                'Anklets': '🔗',
                'MangalSutra': '📿',
                'NoseRings': '💍',
                'Pendants': '📿',
                'BroochesAndPins': '📌'
            };
            return icons[category] || '💎';
        }

        function getCategoryDisplayName(category) {
            const names = {
                'Bangles': 'Bangles',
                'Necklaces': 'Necklaces',
                'Earrings': 'Earrings',
                'Rings': 'Rings',
                'Bracelets': 'Bracelets',
                'Anklets': 'Anklets',
                'MangalSutra': 'Mangal Sutra',
                'NoseRings': 'Nose Rings',
                'Pendants': 'Pendants',
                'BroochesAndPins': 'Brooches & Pins'
            };
            return names[category] || category;
        }

        function searchProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;

            const filtered = allProducts.filter(product => {
                const matchesSearch = !search || product.name.toLowerCase().includes(search) ||
                    (product.description && product.description.toLowerCase().includes(search));
                const matchesCategory = !category || product.category === category;

                return matchesSearch && matchesCategory;
            });

            displayProducts(filtered);
        }

        async function likeProduct(productId) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/Products/${productId}/like`, {
                    method: 'POST'
                });

                if (response.ok) {
                    // Reload products to get updated like count
                    await loadProducts();
                }
            } catch (error) {
                console.error('Error liking product:', error);
            }
        }

        // Search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchProducts();
            }
        });

        // Live search as you type
        document.getElementById('searchInput').addEventListener('input', searchProducts);
        document.getElementById('categoryFilter').addEventListener('change', searchProducts);
    </script>
</body>

</html>
